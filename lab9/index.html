<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Clicker</title>
<link rel="stylesheet" href="../lab9/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<canvas id="matrix-canvas"></canvas>


<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>


<div class="side-panel left">
  <div class="side-line"></div>
  <div class="side-icon"> ⚡</div>
  <div class="side-stat" id="side-clicks">CLICKS: 0</div>
  <div class="side-icon">🔮</div>
  <div class="side-stat" id="side-cps">CPS: 0</div>
  <div class="side-icon">💎</div>
  <div class="side-line"></div>
</div>

<div class="side-panel right">
  <div class="side-line"></div>
  <div class="side-icon">🚀</div>
  <div class="side-stat" id="side-total">TOTAL: 0</div>
  <div class="side-icon">🤖</div>
  <div class="side-stat" id="side-upg">UPGS: 0</div>
  <div class="side-icon">🌐</div>
  <div class="side-line"></div>
</div>

<div class="app" id="app">


  <div class="left-panel">

    <div class="neon-card" style="padding: 35px;">
      <div style="background:#0d0d1a; border-radius:16px; padding:14px 10px 10px;">
        <div class="header">
          <h1>CYBER CLICKER</h1>
          <div class="subtitle">Neural Point Engine v2.0</div>
        </div>
        <div class="stats-bar" style="margin-top:12px;">
          <div class="stat-box">
            <div class="stat-label">Points</div>
            <div class="stat-value gold" id="pts-display">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Per Click</div>
            <div class="stat-value cyan" id="cpc-display">1</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Per Sec</div>
            <div class="stat-value pink" id="cps-display">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="neon-card" style="padding:35px;">
      <div style="background:#0d0d1a; border-radius:16px;">
        <div class="click-zone">
          <button class="big-btn" id="main-btn">
            <div class="btn-inner">
              <span class="btn-emoji">⚡</span>
              <div class="btn-label">CLICK</div>
            </div>
          </button>
        </div>
        <div class="passive-indicator">
          Passive income: <span id="passive-label">0</span> pts/sec
        </div>
        <div style="padding:0 16px 14px; font-size:11px; color:#333366; text-align:center; letter-spacing:1px;" id="total-label">
          Total ever: 0 pts
        </div>
      </div>
    </div>

    <div class="neon-card" style="padding:50px;">
      <div style="background:#0d0d1a; border-radius:16px; padding:14px;">
        <div class="panel-title" style="margin-bottom:10px;">Achievements</div>
        <div class="ach-list" id="ach-list"></div>
      </div>
    </div>

  </div>

  <div class="right-panel">
    <div class="panel-title">Upgrades</div>
    <div class="upgrade-list" id="upg-list"></div>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
