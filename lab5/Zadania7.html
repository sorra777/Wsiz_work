<script>
    function naSzesnastkowy(n) {
        if (n === 0) {
            console.log("0");
            return;
        }

        let znaki = "0123456789ABCDEF";
        let wynik = "";

        while (n > 0) {
            let reszta = n % 16;
            wynik = znaki[reszta] + wynik;
            n = Math.floor(n / 16);
        }

        console.log(wynik);
    }
</script>
