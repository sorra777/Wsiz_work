<script>
    function fibonacci(n) {
        let wynik = [];

        for (let i = 0; i < n; i++) {
            if (i === 0) {
                wynik.push(0);
            } else if (i === 1) {
                wynik.push(1);
            } else {
                wynik.push(wynik[i - 1] + wynik[i - 2]);
            }
        }

        console.log(wynik);
    }
</script>
