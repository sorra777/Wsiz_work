<script>
    function obliczY(n) {
        let suma = 0;

        for (let i = 0; i < n; i++) {
            let mianownik = 2 * i + 1; // 1, 3, 5, 7...

            if (i % 2 === 0) {
                suma += 1 / mianownik;
            } else {
                suma -= 1 / mianownik;
            }
        }

        let y = 4 * suma;
        console.log(y);
    }
</script>
